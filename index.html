<!doctype html>
<html lang="en" data-design="2">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2d070b" />

    <!-- Restore the chosen design before paint (avoids a flash of the default) -->
    <script>
      try {
        var d = localStorage.getItem('gdas-design')
        if (d) document.documentElement.setAttribute('data-design', d)
      } catch (e) {}
    </script>

    <!-- DEMO build: all three designs' fonts (Ashton / Oura / Evermade) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Default metadata; per-route values are injected by the <Seo> component -->
    <title>GDAS Bali - Holistic Wellness Resort in Ubud</title>
    <meta
      name="description"
      content="GDAS Bali is a holistic health & wellness resort in the heart of Ubud — yoga, plant-based vegan dining, biohacking health suite, and signature healing retreats."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
